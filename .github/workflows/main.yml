name: Docker-Image bauen

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Projekt laden
        uses: actions/checkout@v6

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Docker-Image prüfen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: local/telegram-guardian-smoke:${{ github.sha }}
          cache-from: type=gha,scope=telegram-guardian
          cache-to: type=gha,mode=max,scope=telegram-guardian
          provenance: false
          sbom: false

  publish:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Projekt laden
        uses: actions/checkout@v6

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Image bauen und hochladen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/sivaslipatron/telegram-guardian:latest
          cache-from: type=gha,scope=telegram-guardian
          cache-to: type=gha,mode=max,scope=telegram-guardian
          provenance: mode=max
          sbom: true
