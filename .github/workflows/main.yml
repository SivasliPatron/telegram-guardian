name: Docker-Image bauen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projekt laden
        uses: actions/checkout@v6

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Image bauen und hochladen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/sivaslipatron/telegram-guardian:latest
